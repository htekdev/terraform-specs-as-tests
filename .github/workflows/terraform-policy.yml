name: Terraform Policy (OPA/Conftest)

on:
  pull_request:
    paths:
      - '**.tf'
      - 'policies/opa/**'
  workflow_dispatch:

env:
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}

jobs:
  opa-unit-tests:
    name: OPA Policy Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install OPA
        run: |
          curl -L -o opa https://openpolicyagent.org/downloads/v0.70.0/opa_linux_amd64_static
          chmod +x opa
          sudo mv opa /usr/local/bin/
      - name: Run OPA Tests
        run: opa test policies/opa/ -v --format pretty

  conftest:
    name: Conftest Policy Evaluation
    runs-on: ubuntu-latest
    needs: opa-unit-tests
    steps:
      - name: Check Azure Credentials
        id: check-creds
        run: |
          if [ -n "$ARM_SUBSCRIPTION_ID" ] && [ -n "$ARM_TENANT_ID" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "available=false" >> $GITHUB_OUTPUT
            echo "::warning::Azure credentials not configured — skipping Conftest plan evaluation"
          fi
      - uses: actions/checkout@v4
        if: steps.check-creds.outputs.available == 'true'
      - uses: hashicorp/setup-terraform@v3
        if: steps.check-creds.outputs.available == 'true'
        with:
          terraform_version: "1.9.0"
      - name: Install Conftest
        if: steps.check-creds.outputs.available == 'true'
        run: |
          LATEST_VERSION=$(curl -s https://api.github.com/repos/open-policy-agent/conftest/releases/latest | grep tag_name | cut -d '"' -f 4 | sed 's/v//')
          curl -L "https://github.com/open-policy-agent/conftest/releases/download/v${LATEST_VERSION}/conftest_${LATEST_VERSION}_Linux_x86_64.tar.gz" | tar xz
          sudo mv conftest /usr/local/bin/
      - name: Terraform Init
        if: steps.check-creds.outputs.available == 'true'
        run: terraform init -backend=false
      - name: Generate Plan JSON
        if: steps.check-creds.outputs.available == 'true'
        run: |
          terraform plan -out=tfplan -input=false \
            -var="environment=dev" \
            -var="location=eastus2" \
            -var="owner=ci-policy-check" \
            -var="cost_center=CC-CI-001"
          terraform show -json tfplan > tfplan.json
      - name: Run Conftest
        if: steps.check-creds.outputs.available == 'true'
        run: conftest test tfplan.json -p policies/opa/ --all-namespaces --output table
