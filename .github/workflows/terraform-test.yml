name: Terraform Tests & Coverage

on:
  pull_request:
    paths:
      - 'modules/**'
      - 'tests/unit/**'
      - 'policies/**'
      - 'scripts/coverage*'
  push:
    branches: [main]
    paths:
      - 'modules/**'
      - 'tests/unit/**'
      - 'policies/**'

jobs:
  terraform-test:
    name: Terraform Test (Mocked)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"
      - name: Terraform Init
        run: terraform init -backend=false -test-directory=tests/unit
      - name: Terraform Test
        run: terraform test -test-directory=tests/unit -verbose

  coverage:
    name: Test Coverage Analysis
    runs-on: ubuntu-latest
    needs: terraform-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install OPA
        run: |
          curl -L -o opa https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static
          chmod +x opa
          sudo mv opa /usr/local/bin/
      - name: Run Coverage Analysis
        run: python scripts/coverage.py --json coverage-report.json
      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage-report.json
          retention-days: 14
