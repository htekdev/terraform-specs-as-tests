name: Terraform Lint & Scan

on:
  pull_request:
    paths:
      - '**.tf'
      - 'policies/**'
  push:
    branches: [main]
    paths:
      - '**.tf'
      - 'policies/**'

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  fmt:
    name: Terraform Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"
      - name: Terraform Format Check
        run: terraform fmt -check -recursive -diff

  validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"
      - name: Terraform Init
        run: terraform init -backend=false
      - name: Terraform Validate
        run: terraform validate

  tflint:
    name: TFLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: "v0.53.0"
      - name: Init TFLint
        run: tflint --init --config "$GITHUB_WORKSPACE/policies/tflint/.tflint.hcl"
      - name: Run TFLint
        run: tflint --recursive --config "$GITHUB_WORKSPACE/policies/tflint/.tflint.hcl" --format compact

  checkov:
    name: Checkov Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform
          external_checks_dir: policies/checkov
          output_format: cli,sarif
          output_file_path: console,results.sarif
          soft_fail: false
          config_file: policies/checkov/.checkov.yaml
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
